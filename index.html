<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PflanzenLog" />
  <title>PflanzenLog</title>
  <style>
    :root{
      --bg:#e9e2cb; --bg2:#d9d2b6; --panel:#f8f0dc; --panel2:#efe5cb; --line:#3a2d23; --text:#2f241a;
      --green:#79a85a; --green2:#5f8845; --accent:#d48645; --accent2:#b5652e; --blue:#87b7c8; --red:#c96b62; --yellow:#e5c65b;
      --shadow:0 6px 0 rgba(58,45,35,.25); --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:linear-gradient(var(--bg),var(--bg2));color:var(--text);font-family:ui-rounded,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
    body{padding:calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 96px);}
    .app{max-width:980px;margin:0 auto;}
    .pixel{image-rendering:pixelated;image-rendering:crisp-edges;}
    .topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--panel);border:3px solid var(--line);border-radius:22px;box-shadow:var(--shadow);}
    .logo{width:54px;height:54px;border-radius:14px;border:3px solid var(--line);display:grid;place-items:center;background:linear-gradient(#99cb74,#6f9c4f);font-size:28px;}
    h1,h2,h3{margin:0 0 8px 0;line-height:1.1}
    .sub{opacity:.85;font-size:14px}
    .screen{display:none;margin-top:14px;gap:14px;}
    .screen.active{display:grid;}
    .card{background:var(--panel);border:3px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;}
    .card.soft{background:var(--panel2);}
    .grid{display:grid;gap:12px;}
    .grid-2{grid-template-columns:repeat(auto-fit,minmax(240px,1fr));}
    .grid-3{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
    .stat{background:#fff8ea;border:3px solid var(--line);border-radius:16px;padding:12px;}
    .stat .big{font-size:26px;font-weight:800;}
    label{display:block;font-size:13px;font-weight:700;margin-bottom:5px;}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;border:3px solid var(--line);background:#fffaf0;border-radius:14px;padding:10px 12px;color:var(--text);}
    textarea{min-height:84px;resize:vertical}
    button{border:3px solid var(--line);background:var(--panel2);color:var(--text);border-radius:14px;padding:10px 12px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 rgba(58,45,35,.18);}
    button.primary{background:var(--green);color:#fff}
    button.accent{background:var(--accent);color:#fff}
    button.danger{background:var(--red);color:#fff}
    button.ghost{background:#fff8ea}
    button.small{padding:7px 10px;font-size:13px;border-radius:12px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .space{justify-content:space-between}
    .list{display:grid;gap:10px}
    .plant-row,.sale-row,.history-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;background:#fff8ea;border:3px solid var(--line);border-radius:16px;padding:10px;}
    .plant-row.clickable{cursor:pointer}
    .sprite-box{width:74px;height:74px;border:3px solid var(--line);border-radius:14px;background:#dbe0c3;display:grid;place-items:center;overflow:hidden;flex:0 0 auto;}
    .sprite-box img{width:100%;height:100%;object-fit:contain;display:block}
    .big-sprite{width:138px;height:138px}
    .pill{display:inline-flex;align-items:center;gap:6px;border:2px solid var(--line);padding:5px 9px;border-radius:999px;background:#f5eed9;font-size:12px;font-weight:700;}
    .muted{opacity:.75}
    .hint{font-size:12px;opacity:.75}
    .price-table{display:grid;gap:8px;margin-top:10px}
    .price-row{display:grid;grid-template-columns:1.2fr .8fr .8fr auto;gap:8px;align-items:end;background:#fff8ea;border:2px solid var(--line);border-radius:14px;padding:8px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .empty{padding:18px;border:2px dashed var(--line);border-radius:16px;background:#fbf6eb;opacity:.8}
    .nav{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);background:rgba(248,240,220,.97);backdrop-filter:blur(8px);border-top:3px solid var(--line);z-index:50}
    .nav button{padding:10px 4px;background:#fff8ea}
    .nav button.active{background:var(--green);color:#fff}
    .modal{position:fixed;inset:0;background:rgba(30,20,10,.45);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:14px;}
    .modal.show{display:flex;}
    .sheet{width:min(860px,100%);max-height:92vh;overflow:auto;background:var(--panel);border:3px solid var(--line);border-radius:22px;box-shadow:0 12px 32px rgba(0,0,0,.25);padding:16px;}
    .detail-hero{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}
    .timeline{display:grid;gap:8px}
    .history-row{grid-template-columns:1fr auto}
    .chart-wrap{background:#fff8ea;border:3px solid var(--line);border-radius:16px;padding:8px}
    canvas{width:100%;height:auto;display:block}
    .section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
    .warning{background:#fff2dc;border-left:6px solid var(--accent);padding:10px 12px;border-radius:12px}
    @media (max-width:700px){
      .nav{grid-template-columns:repeat(6,1fr)}
      .detail-hero{grid-template-columns:1fr;justify-items:center;text-align:center}
      .plant-row,.sale-row{grid-template-columns:auto 1fr;}
      .plant-row > .actions,.sale-row > .actions{grid-column:1 / -1}
      .price-row{grid-template-columns:1fr 1fr;}
    }
  </style>

<script>
(function(){
  const DB_NAME = 'PflanzenLogDB';
  const DB_VERSION = 1;
  const STORE = 'appState';
  const STATE_KEY_CANDIDATES = ['pflanzenlog_state','pflanzenlog','appState','state'];
  const META_KEY = 'pflanzenlog_idb_migrated';

  function openDb(){
    return new Promise((resolve,reject)=>{
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e)=>{
        const db = req.result;
        if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
      };
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>reject(req.error);
    });
  }

  async function idbGet(key){
    const db = await openDb();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE,'readonly');
      const os = tx.objectStore(STORE);
      const req = os.get(key);
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>reject(req.error);
    });
  }

  async function idbSet(key,val){
    const db = await openDb();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE,'readwrite');
      const os = tx.objectStore(STORE);
      os.put(val,key);
      tx.oncomplete = ()=>resolve();
      tx.onerror = ()=>reject(tx.error);
    });
  }

  function tryParse(v){
    if(!v) return null;
    try { return JSON.parse(v); } catch(e){ return null; }
  }

  function findLegacyState(){
    for(const k of STATE_KEY_CANDIDATES){
      const parsed = tryParse(localStorage.getItem(k));
      if(parsed && typeof parsed === 'object') return {key:k, state:parsed};
    }
    return null;
  }

  function looksLikeAppState(obj){
    return !!obj && typeof obj === 'object' && (
      Array.isArray(obj.arten) || Array.isArray(obj.bestand) || Array.isArray(obj.logs) || Array.isArray(obj.verkauf)
    );
  }

  function mergeDefaults(state){
    const s = (state && typeof state === 'object') ? state : {};
    if(!Array.isArray(s.arten)) s.arten = [];
    if(!Array.isArray(s.bestand)) s.bestand = [];
    if(!Array.isArray(s.logs)) s.logs = [];
    if(!Array.isArray(s.verkauf)) s.verkauf = [];
    if(!Array.isArray(s.soldHistory)) s.soldHistory = [];
    if(!s.settings || typeof s.settings !== 'object') s.settings = {};
    return s;
  }

  async function bootstrapState(){
    const existing = await idbGet('state');
    if(looksLikeAppState(existing)){
      window.__PLANTENLOG_BOOTSTRAP_STATE__ = mergeDefaults(existing);
      return;
    }
    const legacy = findLegacyState();
    if(legacy && looksLikeAppState(legacy.state)){
      const migrated = mergeDefaults(legacy.state);
      await idbSet('state', migrated);
      localStorage.setItem(META_KEY, '1');
      window.__PLANTENLOG_BOOTSTRAP_STATE__ = migrated;
      return;
    }
    window.__PLANTENLOG_BOOTSTRAP_STATE__ = null;
  }

  function installBridges(){
    const originalSetItem = Storage.prototype.setItem;
    Storage.prototype.setItem = function(key, value){
      const result = originalSetItem.apply(this, arguments);
      try {
        const parsed = tryParse(value);
        if((STATE_KEY_CANDIDATES.includes(key) || looksLikeAppState(parsed)) && parsed){
          idbSet('state', mergeDefaults(parsed)).catch(()=>{});
        }
      } catch(e){}
      return result;
    };

    window.PflanzenLogDB = {
      async getState(){
        const state = await idbGet('state');
        return mergeDefaults(state || findLegacyState()?.state || {});
      },
      async saveState(state){
        const merged = mergeDefaults(state);
        await idbSet('state', merged);
        return merged;
      },
      async exportState(){
        return await this.getState();
      }
    };
  }

  window.__PLANTENLOG_BOOTSTRAP_PROMISE__ = bootstrapState().finally(installBridges);
})();
</script>

    <div class="logo pixel">🪴</div>

function slug(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); }
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function readFileAsDataURL(file){ return new Promise((res,rej)=>{ if(!file) return res(null); const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }

function migrateState(raw){
  const state = raw && typeof raw === 'object' ? raw : clone(EMBEDDED_BACKUP);
  state.arten = Array.isArray(state.arten) ? state.arten : [];
  state.bestand = Array.isArray(state.bestand) ? state.bestand : [];
  state.logs = Array.isArray(state.logs) ? state.logs : [];
  state.verkauf = Array.isArray(state.verkauf) ? state.verkauf : [];
  state.soldHistory = Array.isArray(state.soldHistory) ? state.soldHistory : [];
  state.version = 3;
  for(const a of state.arten){
    if(!a.id) a.id = id();
    if(!a.bereich) a.bereich = 'Indoor';
    if(!a.gruppe) a.gruppe = '';
    if(!a.typeHint) a.typeHint = inferTypeHint(a.name, a.gruppe);
    if(!Array.isArray(a.preise)) a.preise = defaultPricesFromOld(a.name, state.verkauf, a.preise);
  }
  for(const b of state.bestand){
    if(!b.id) b.id=id();
    if(typeof b.startLeafs !== 'number') b.startLeafs = Number(b.startLeafs||0);
    if(!b.status) b.status='Bestand';
    if(!b.standort) b.standort='';
    if(!('image' in b)) b.image='';
    if(!('name' in b)) b.name='';
  }
  for(const l of state.logs){
    if(!l.id) l.id=id();
    if(!l.date) l.date=today;
    if(typeof l.delta !== 'number') l.delta = Number(l.delta||0);
    if(!l.type) l.type = l.delta >=0 ? 'leaf_gain':'leaf_loss';
  }
  for(const v of state.verkauf){
    if(!v.id) v.id=id();
    if(!v.status) v.status='verfügbar';
    if(!v.stage) v.stage='';
    if(typeof v.price !== 'number') v.price=Number(v.price||0);
  }
  for(const s of state.soldHistory){
    if(!s.id) s.id=id();
    if(typeof s.salePrice !== 'number') s.salePrice=Number(s.salePrice||0);
  }
  return state;
}

function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function loadState(){
  if (window.__PLANTENLOG_BOOTSTRAP_STATE__) return window.__PLANTENLOG_BOOTSTRAP_STATE__;
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){ try{ return migrateState(JSON.parse(raw)); }catch(e){ console.error(e); } }
  return migrateState(clone(EMBEDDED_BACKUP));
}

function inferTypeHint(name='', gruppe=''){
  const s = `${name} ${gruppe}`.toLowerCase();
  if(s.includes('alocasia')) return 'alocasia';
  if(s.includes('monstera')) return 'monstera';
  if(s.includes('ficus')) return 'ficus';
  if(s.includes('grünlilie') || s.includes('chlorophytum')) return 'spider';
  if(s.includes('crassula')) return 'succulent';
  if(s.includes('einblatt') || s.includes('spathiphyllum')) return 'peace';
  if(s.includes('efeutute') || s.includes('epipremnum')) return 'vine';
  if(s.includes('syngonium')) return 'syngonium';
  if(s.includes('tomate')) return 'tomato';
  if(s.includes('basilikum') || s.includes('rosmarin') || s.includes('kräuter')) return 'herb';
  return 'leafy';
}

function defaultPricesFromOld(name, sales){ return []; }

function getArt(id){ return state.arten.find(a=>a.id===id); }
function artName(id){ return getArt(id)?.name || 'Unbekannte Art'; }
function getPlant(id){ return state.bestand.find(b=>b.id===id); }
function plantArt(plant){ return getArt(plant.artId) || null; }
function getPlantLogs(plantId){ return state.logs.filter(l=>l.plantId===plantId).sort((a,b)=>a.date.localeCompare(b.date)); }
function currentLeafs(plant){ return Number(plant.startLeafs||0) + getPlantLogs(plant.id).reduce((s,l)=>s+Number(l.delta||0),0); }
function totalGained(plant){ return getPlantLogs(plant.id).filter(l=>Number(l.delta)>0).reduce((s,l)=>s+Number(l.delta),0); }
function totalLost(plant){ return Math.abs(getPlantLogs(plant.id).filter(l=>Number(l.delta)<0).reduce((s,l)=>s+Number(l.delta),0)); }
function uniqueStandorte(){ return [...new Set(state.bestand.map(b=>b.standort).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'de')); }
function uniqueJahre(){ const years = new Set(state.soldHistory.map(s => (s.saleDate||'').slice(0,4)).filter(Boolean)); years.add(new Date().getFullYear().toString()); return [...years].sort(); }

function spriteMarkup(art, cls=''){
  const img = art?.image || '';
  if(img) return `<img class="pixel ${cls}" src="${img}" alt="${escapeHtml(art?.name||'Pflanze')}">`;
  return spriteSVG(art?.typeHint || inferTypeHint(art?.name, art?.gruppe));
}

  rows.sort((a,b)=> sort==='price' ? Number(b.salePrice||0)-Number(a.salePrice||0) : (b.saleDate||'').localeCompare(a.saleDate||''));
  return rows;
}

function renderSalesOverview(){
  const rows = filteredSoldHistory();
  const revenue = rows.reduce((s,r)=>s+Number(r.salePrice||0),0);
  const avg = rows.length ? revenue / rows.length : 0;
  const byArt = {};
  const byMonth = Array.from({length:12},()=>0);
  rows.forEach(r=>{ byArt[r.artName]=(byArt[r.artName]||0)+Number(r.salePrice||0); const m = Number((r.saleDate||'').slice(5,7)); if(m>=1&&m<=12) byMonth[m-1]+=Number(r.salePrice||0); });
  const topArt = Object.entries(byArt).sort((a,b)=>b[1]-a[1])[0];
  const box = document.getElementById('salesOverview');
  box.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="muted">Verkäufe</div><div class="big">${rows.length}</div></div>
      <div class="stat"><div class="muted">Umsatz</div><div class="big">${eur(revenue)}</div></div>
      <div class="stat"><div class="muted">Ø Preis</div><div class="big">${eur(avg)}</div></div>
      <div class="stat"><div class="muted">Top-Art</div><div class="big" style="font-size:16px">${topArt ? escapeHtml(topArt[0]) : '—'}</div></div>
    </div>
    <div class="chart-wrap" style="margin-top:10px"><canvas id="salesChart" width="720" height="220"></canvas></div>
    <div class="list" style="margin-top:10px">
      ${rows.length ? rows.map(r => `<div class="history-row"><div><b>${escapeHtml(r.label || r.artName)}</b><br><span class="pill">${escapeHtml(r.artName)}</span> <span class="pill">${fmtDate(r.saleDate)}</span></div><div><b>${eur(r.salePrice)}</b></div></div>`).join('') : '<div class="empty">Noch keine verkauften Pflanzen in der Historie.</div>'}
    </div>`;
  drawSalesChart(byMonth);
}

function drawSalesChart(values){
  const c = document.getElementById('salesChart'); if(!c) return; const ctx = c.getContext('2d');
  const w = c.width, h = c.height, p=28; ctx.clearRect(0,0,w,h); ctx.fillStyle='#fff8ea'; ctx.fillRect(0,0,w,h);
  const max = Math.max(...values, 10); const bw = (w-p*2)/12 - 8;
  ctx.strokeStyle='#3a2d23'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(p,10); ctx.lineTo(p,h-p); ctx.lineTo(w-10,h-p); ctx.stroke();
  values.forEach((v,i)=>{ const x = p + i*((w-p*2)/12) + 4; const bh = ((h-p-20)*(v/max)); ctx.fillStyle='#79a85a'; ctx.fillRect(x, h-p-bh, bw, bh); ctx.strokeStyle='#3a2d23'; ctx.strokeRect(x, h-p-bh, bw, bh); ctx.fillStyle='#2f241a'; ctx.font='12px sans-serif'; ctx.fillText(String(i+1), x+4, h-10); });
}

function renderTools(){
  document.getElementById('screen-tools').innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <div class="section-title"><h2>Backup</h2></div>
        <p>Vor jedem Update auf GitHub am besten einmal exportieren. Wenn du dieselbe URL behältst, bleiben lokale Daten normalerweise erhalten.</p>
        <div class="row"><button class="primary" onclick="exportBackup()">Backup exportieren</button><label class="small" style="display:inline-block"><input id="importBackup" type="file" accept="application/json" style="display:none"> <button class="accent" onclick="document.getElementById('importBackup').click()" type="button">Backup importieren</button></label></div>
      </div>
      <div class="card">
        <div class="section-title"><h2>Kritische Empfehlung</h2></div>
        <ul>
          <li><b>Verkaufsübersicht</b> nicht nur als Liste sehen, sondern Umsatz pro Jahr/Monat beobachten.</li>
          <li>Später wären zusätzlich sinnvoll: <b>Käufer-Notiz</b>, <b>Verkaufsplattform</b> und <b>Gewinn vs. Listenpreis</b>.</li>
          <li>Für Standortpflege ist der neue <b>Filter-Reiter</b> der schnellste Einstiegspunkt.</li>
        </ul>
      </div>
    </div>`;
}

document.addEventListener('change', async (e)=>{
  if(e.target.id==='importBackup'){
    const file = e.target.files[0];
    if(!file) return;
    const txt = await file.text();
    try{ state = migrateState(JSON.parse(txt)); saveState(); renderAll(); alert('Backup importiert.'); }catch(err){ alert('Backup konnte nicht gelesen werden.'); }
  }
});

function exportBackup(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='pflanzenlog_backup.json'; a.click(); URL.revokeObjectURL(a.href);
}

function openArtForm(artId=''){
  const art = artId ? clone(getArt(artId)) : {id:id(),name:'',bereich:'Indoor',gruppe:'',typeHint:'leafy',note:'',image:'',preise:[]};
  openModal(`
    <div class="section-title"><h2>${artId?'Art bearbeiten':'Neue Art anlegen'}</h2><button onclick="closeModal()">Schließen</button></div>
    <form id="artForm" class="grid" onsubmit="saveArt(event, '${art.id}')">
      <div class="detail-hero">
        <div class="sprite-box big-sprite">${spriteMarkup(art)}</div>
        <div class="grid grid-2">
          <div><label>Name</label><input name="name" value="${escapeHtml(art.name)}" required></div>
          <div><label>Bereich</label><select name="bereich"><option ${art.bereich==='Indoor'?'selected':''}>Indoor</option><option ${art.bereich==='Outdoor'?'selected':''}>Outdoor</option></select></div>
          <div><label>Gruppe</label><input name="gruppe" value="${escapeHtml(art.gruppe)}" placeholder="z. B. Alocasia"></div>
          <div><label>Typ</label><select name="typeHint">${['alocasia','monstera','ficus','spider','succulent','peace','vine','syngonium','tomato','herb','leafy'].map(t=>`<option value="${t}" ${art.typeHint===t?'selected':''}>${t}</option>`).join('')}</select></div>
          <div class="grid" style="grid-column:1/-1"><label>Notiz</label><textarea name="note">${escapeHtml(art.note||'')}</textarea></div>
          <div class="grid" style="grid-column:1/-1"><label>Bild / Sprite korrigieren</label><input id="artImageInput" type="file" accept="image/*"><div class="hint">Wenn das Bild nicht passt, hier direkt ersetzen. Das war einer deiner wichtigsten Punkte.</div></div>
        </div>
      </div>
      <div class="row" style="justify-content:flex-end"><button type="button" onclick="closeModal()">Abbrechen</button><button class="primary" type="submit">Speichern</button></div>
    </form>`);
}

function openImageOnly(artId){ openArtForm(artId); setTimeout(()=>document.getElementById('artImageInput')?.click(), 80); }

async async function saveArt(e, artId){
  e.preventDefault();
  const form = e.target;
  const data = Object.fromEntries(new FormData(form).entries());
  let art = getArt(artId);
  const input = document.getElementById('artImageInput');
  const img = await readFileAsDataURL(input?.files?.[0]);
  if(art){ Object.assign(art, data); if(img) art.image = img; }
  else { art = {id:artId, ...data, image: img || ''}; state.arten.push(art); }
  art.typeHint = data.typeHint || inferTypeHint(art.name, art.gruppe);
  if(!Array.isArray(art.preise)) art.preise = [];
  saveState(); closeModal(); renderAll();
}

function openPlantForm(plantId=''){
  const plant = plantId ? clone(getPlant(plantId)) : {id:id(), artId:state.arten[0]?.id||'', name:'', standort:'', status:'Bestand', startLeafs:0, image:''};
  const artOptions = state.arten.map(a=>`<option value="${a.id}" ${plant.artId===a.id?'selected':''}>${escapeHtml(a.name)}</option>`).join('');
  openModal(`
    <div class="section-title"><h2>${plantId?'Bestandspflanze bearbeiten':'Bestandspflanze anlegen'}</h2><div class="row"><button class="ghost small" type="button" onclick="openArtForm()">+ Neue Art</button><button onclick="closeModal()">Schließen</button></div></div>
    <form id="plantForm" class="grid grid-2" onsubmit="savePlant(event, '${plant.id}')">
      <div><label>Art</label><select name="artId" required>${artOptions}</select><div class="hint">Neue Arten legst du künftig hierüber indirekt an: zuerst „Neue Art“, dann direkt wieder auswählen.</div></div>
      <div><label>Eigener Name / Kürzel</label><input name="name" value="${escapeHtml(plant.name||'')}" placeholder="optional"></div>
      <div><label>Standort</label><input name="standort" value="${escapeHtml(plant.standort||'')}" placeholder="z. B. REA Büro"></div>
      <div><label>Status</label><select name="status"><option ${plant.status==='Bestand'?'selected':''}>Bestand</option><option ${plant.status==='zum Verkauf'?'selected':''}>zum Verkauf</option><option ${plant.status==='verkauft'?'selected':''}>verkauft</option><option ${plant.status==='Archiv'?'selected':''}>Archiv</option></select></div>
      <div><label>Start-Blattanzahl</label><input type="number" name="startLeafs" min="0" step="1" value="${Number(plant.startLeafs||0)}"></div>
      <div><label>Eigenes Pflanzenbild</label><input id="plantImageInput" type="file" accept="image/*"></div>
      <div class="row" style="grid-column:1/-1;justify-content:flex-end"><button type="button" onclick="closeModal()">Abbrechen</button>${plantId?`<button class="danger" type="button" onclick="deletePlant('${plant.id}')">Löschen</button>`:''}<button class="primary" type="submit">Speichern</button></div>
    </form>`);
}

async async function savePlant(e, plantId){
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  data.startLeafs = Number(data.startLeafs||0);
  let plant = getPlant(plantId);
  const img = await readFileAsDataURL(document.getElementById('plantImageInput')?.files?.[0]);
  if(plant){ Object.assign(plant, data); if(img) plant.image = img; }
  else { plant = {id:plantId, ...data, image: img || ''}; state.bestand.push(plant); }
  saveState(); closeModal(); renderAll();
}

function deletePlant(plantId){ if(!confirm('Pflanze wirklich löschen?')) return; state.bestand = state.bestand.filter(p=>p.id!==plantId); state.logs = state.logs.filter(l=>l.plantId!==plantId); saveState(); closeModal(); renderAll(); }

function plantVisual(leafCount){
  const leaves = Math.max(0, Math.min(12, Number(leafCount||0)));
  const positions = [[48,18],[28,26],[68,26],[22,42],[74,42],[35,52],[61,52],[18,58],[80,58],[45,66],[57,66],[32,72]];
  const leafSvg = positions.slice(0, leaves).map(([x,y],i)=>`<ellipse cx="${x}" cy="${y}" rx="10" ry="15" fill="#88b765" stroke="#2f241a" stroke-width="2" transform="rotate(${(i%2?20:-20)} ${x} ${y})"/>`).join('');
  return `<svg class="pixel" viewBox="0 0 100 100" width="120" height="120"><path d="M30 70 h40 l-5 18 h-30 z" fill="#a65d2a" stroke="#2f241a" stroke-width="2"/><path d="M26 64 h48 l-4 8 h-40 z" fill="#c87b44" stroke="#2f241a" stroke-width="2"/><ellipse cx="50" cy="66" rx="16" ry="5" fill="#55331f"/>${leafSvg}</svg>`;
}

function openPlantDetail(plantId){
  const plant = getPlant(plantId); if(!plant) return;
  currentDetailId = plantId;
  const art = plantArt(plant);
  const logs = getPlantLogs(plantId).slice().reverse();
  const leafs = currentLeafs(plant);
  openModal(`
    <div class="section-title"><h2>Pflanzendetail</h2><div class="row"><button class="small" onclick="openPlantForm('${plant.id}')">Bearbeiten</button><button onclick="closeModal()">Schließen</button></div></div>
    <div class="detail-hero card soft">
      <div class="sprite-box big-sprite">${plant.image ? `<img class="pixel" src="${plant.image}" alt="">` : spriteMarkup(art)}</div>
      <div>
        <h2>${escapeHtml(plant.name || art?.name || 'Pflanze')}</h2>
        <div class="row"><span class="pill">${escapeHtml(art?.name||'')}</span><span class="pill">${escapeHtml(plant.standort||'ohne Ort')}</span><span class="pill">${escapeHtml(plant.status)}</span></div>
        <div class="stats" style="margin-top:10px">
          <div class="stat"><div class="muted">Aktuell</div><div class="big">${leafs}</div></div>
          <div class="stat"><div class="muted">Gewonnen</div><div class="big">${totalGained(plant)}</div></div>
          <div class="stat"><div class="muted">Verloren</div><div class="big">${totalLost(plant)}</div></div>
        </div>
      </div>
    </div>
    <div class="grid grid-2" style="margin-top:12px">
      <div class="card soft">
        <div class="section-title"><h3>Visuelle Blattanzeige</h3></div>
        <div style="display:grid;place-items:center">${plantVisual(leafs)}</div>
        <div class="row" style="margin-top:10px;justify-content:center">
          <button class="primary" onclick="quickLeaf('${plant.id}', 1)">+ Blatt</button>
          <button class="danger" onclick="quickLeaf('${plant.id}', -1)">- Blatt</button>
          <button onclick="openLogForm('${plant.id}')">Logeintrag</button>
        </div>
      </div>
      <div class="card soft">
        <div class="section-title"><h3>Blattverlauf</h3></div>
        <div class="chart-wrap"><canvas id="leafChart" width="520" height="240"></canvas></div>
      </div>
    </div>
    <div class="card" style="margin-top:12px">
      <div class="section-title"><h3>Historie</h3></div>
      <div class="timeline">${logs.length ? logs.map(l=>`<div class="history-row"><div><b>${l.delta>0?`+${l.delta} Blatt/Blätter`: `${l.delta} Blatt/Blätter`}</b><br><span class="pill">${fmtDate(l.date)}</span>${l.note?` <span class="hint">${escapeHtml(l.note)}</span>`:''}</div><div class="row"><button class="small danger" onclick="deleteLog('${l.id}','${plant.id}')">Löschen</button></div></div>`).join('') : '<div class="empty">Noch keine Logeinträge.</div>'}</div>
    </div>`);
  drawLeafChart(plant);
}

function drawLeafChart(plant){
  const canvas = document.getElementById('leafChart'); if(!canvas) return; const ctx = canvas.getContext('2d');
  const w=canvas.width,h=canvas.height,p=30; ctx.clearRect(0,0,w,h); ctx.fillStyle='#fff8ea'; ctx.fillRect(0,0,w,h);
  const logs = getPlantLogs(plant.id); const pts = [{date:'Start', value:Number(plant.startLeafs||0)}]; let v=Number(plant.startLeafs||0); logs.forEach(l=>{ v += Number(l.delta||0); pts.push({date:l.date, value:v}); });
  const max = Math.max(...pts.map(p=>p.value), 1); ctx.strokeStyle='#3a2d23'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(p,10); ctx.lineTo(p,h-p); ctx.lineTo(w-10,h-p); ctx.stroke();
  if(pts.length===1){ ctx.fillStyle='#2f241a'; ctx.fillText('Noch kein Verlauf.', p+10, h/2); return; }
  ctx.strokeStyle='#79a85a'; ctx.lineWidth=4; ctx.beginPath();
  pts.forEach((pt,i)=>{ const x = p + (i*((w-p*2)/(pts.length-1))); const y = h-p - ((h-p-20)*(pt.value/max)); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke();
  pts.forEach((pt,i)=>{ const x = p + (i*((w-p*2)/(pts.length-1))); const y = h-p - ((h-p-20)*(pt.value/max)); ctx.fillStyle='#d48645'; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#3a2d23'; ctx.stroke(); ctx.fillStyle='#2f241a'; ctx.font='12px sans-serif'; ctx.fillText(String(pt.value), x-4, y-10); });
}

function openLogForm(plantId){
  openModal(`
    <div class="section-title"><h2>Logeintrag</h2><button onclick="closeModal()">Schließen</button></div>
    <form class="grid grid-2" onsubmit="saveLog(event, '${plantId}')">
      <div><label>Datum</label><input type="date" name="date" value="${today}" required></div>
      <div><label>Änderung Blattzahl</label><input type="number" name="delta" value="1" required></div>
      <div style="grid-column:1/-1"><label>Notiz</label><textarea name="note" placeholder="optional"></textarea></div>
      <div class="row" style="grid-column:1/-1;justify-content:flex-end"><button type="button" onclick="closeModal()">Abbrechen</button><button class="primary" type="submit">Speichern</button></div>
    </form>`);
}
function quickLeaf(plantId, delta){ state.logs.push({id:id(), plantId, date:today, delta, type:delta>0?'leaf_gain':'leaf_loss', note:''}); saveState(); openPlantDetail(plantId); renderAll(false); }
function saveLog(e, plantId){ e.preventDefault(); const data = Object.fromEntries(new FormData(e.target).entries()); state.logs.push({id:id(), plantId, date:data.date, delta:Number(data.delta||0), type:Number(data.delta)>=0?'leaf_gain':'leaf_loss', note:data.note||''}); saveState(); closeModal(); openPlantDetail(plantId); renderAll(false); }
function deleteLog(logId, plantId){ state.logs = state.logs.filter(l=>l.id!==logId); saveState(); openPlantDetail(plantId); renderAll(false); }

function openSaleForm(saleId=''){
  const sale = saleId ? clone(state.verkauf.find(v=>v.id===saleId)) : {id:id(), artId:state.arten[0]?.id||'', label:'', stage:'', price:0, status:'verfügbar', note:''};
  const artOptions = state.arten.map(a=>`<option value="${a.id}" ${sale.artId===a.id?'selected':''}>${escapeHtml(a.name)}</option>`).join('');
  openModal(`
    <div class="section-title"><h2>${saleId?'Verkauf bearbeiten':'Verkauf anlegen'}</h2><button onclick="closeModal()">Schließen</button></div>
    <form class="grid grid-2" onsubmit="saveSale(event, '${sale.id}')">
      <div><label>Art</label><select name="artId">${artOptions}</select></div>
      <div><label>Bezeichnung</label><input name="label" value="${escapeHtml(sale.label||'')}" placeholder="z. B. M1"></div>
      <div><label>Stufe / Größe</label><input name="stage" value="${escapeHtml(sale.stage||'')}" placeholder="z. B. 4 Blätter"></div>
      <div><label>Preis</label><input type="number" step="0.01" name="price" value="${Number(sale.price||0)}"></div>
      <div><label>Status</label><select name="status"><option value="verfügbar" ${sale.status==='verfügbar'?'selected':''}>verfügbar</option><option value="reserviert" ${sale.status==='reserviert'?'selected':''}>reserviert</option></select></div>
      <div><label>Notiz</label><input name="note" value="${escapeHtml(sale.note||'')}"></div>
      <div class="row" style="grid-column:1/-1;justify-content:flex-end"><button type="button" onclick="closeModal()">Abbrechen</button><button class="primary" type="submit">Speichern</button></div>
    </form>`);
}

function saveSale(e, saleId){
  e.preventDefault(); const data = Object.fromEntries(new FormData(e.target).entries()); data.price = Number(data.price||0);
  let item = state.verkauf.find(v=>v.id===saleId);
  if(item) Object.assign(item, data); else state.verkauf.push({id:saleId, ...data});
  saveState(); closeModal(); renderAll();
}

function deleteSale(saleId){ if(!confirm('Verkaufseintrag löschen?')) return; state.verkauf = state.verkauf.filter(v=>v.id!==saleId); saveState(); renderAll(); }

function markSaleSold(saleId){
  const sale = state.verkauf.find(v=>v.id===saleId); if(!sale) return;
  openModal(`
    <div class="section-title"><h2>Als verkauft markieren</h2><button onclick="closeModal()">Schließen</button></div>
    <form class="grid grid-2" onsubmit="confirmSaleSold(event, '${saleId}')">
      <div><label>Verkaufsdatum</label><input type="date" name="saleDate" value="${today}" required></div>
      <div><label>Tatsächlicher Verkaufspreis</label><input type="number" step="0.01" name="salePrice" value="${Number(sale.price||0)}" required></div>
      <div style="grid-column:1/-1"><label>Notiz</label><input name="note" value="${escapeHtml(sale.note||'')}"></div>
      <div class="row" style="grid-column:1/-1;justify-content:flex-end"><button type="button" onclick="closeModal()">Abbrechen</button><button class="primary" type="submit">Verkauf speichern</button></div>
    </form>`);
}

function confirmSaleSold(e, saleId){
  e.preventDefault(); const f = Object.fromEntries(new FormData(e.target).entries()); const sale = state.verkauf.find(v=>v.id===saleId); if(!sale) return;
  const art = getArt(sale.artId);
  state.soldHistory.push({id:id(), saleId, artId:sale.artId, artName:art?.name||'', label:sale.label||art?.name||'', stage:sale.stage||'', saleDate:f.saleDate, salePrice:Number(f.salePrice||0), note:f.note||''});
  sale.status='verkauft';
  saveState(); closeModal(); renderAll();
}

function renderAll(reset=true){ renderHome(); renderArten(); renderBestand(); renderFilter(); renderVerkauf(); renderTools(); if(reset) switchScreen(document.querySelector('.nav button.active')?.dataset.screen || 'home'); }
renderAll();
</script>
